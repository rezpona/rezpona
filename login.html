<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060612">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233b82f6'/><stop offset='1' stop-color='%2322d3ee'/></linearGradient></defs><rect x='2' y='2' width='96' height='96' rx='26' fill='%230c1424'/><path d='M50 18 C53 41,55 45,82 50 C55 55,53 59,50 82 C47 59,45 55,18 50 C45 45,47 41,50 18 Z' fill='url(%23g)'/><circle cx='73' cy='29' r='5' fill='%2322d3ee'/></svg>">
  <title>Sign in — Rezpona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;1,9..144,200&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060612;--acc:#00CEFF;--acc2:#5B6FFF;--text:#EEF2FF;--muted:#6B7B92;--bd:rgba(255,255,255,0.075);--err:#FF4466}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
.bg-orb{position:fixed;border-radius:50%;z-index:0;pointer-events:none}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,206,255,.07),transparent 70%);top:-200px;left:-200px}
.orb2{width:600px;height:600px;background:radial-gradient(circle,rgba(91,111,255,.07),transparent 70%);bottom:-200px;right:-200px}

/* NAV */
nav{position:relative;z-index:1;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:.55rem;text-decoration:none;color:var(--text)}
.logo-ic{width:32px;height:32px;flex-shrink:0}
.logo-t{font-size:1.2rem;font-weight:700;letter-spacing:-.02em}
.logo-t span{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back{font-size:.84rem;color:var(--muted);text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}

/* CARD */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative;z-index:1}
.card{width:100%;max-width:420px}
.card-head{text-align:center;margin-bottom:2rem}
.card-head h1{font-family:'Fraunces',serif;font-weight:200;font-size:2.2rem;letter-spacing:-.02em;margin-bottom:.5rem}
.card-head p{font-size:.9rem;color:var(--muted);font-weight:300}
.card-body{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:22px;padding:2rem}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;padding:3px;gap:3px;margin-bottom:1.6rem}
.tab{flex:1;padding:.55rem;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;border-radius:9px;cursor:pointer;transition:all .22s}
.tab.active{background:rgba(0,206,255,.15);color:var(--text)}

/* GOOGLE BTN */
.btn-google{width:100%;padding:.85rem;border-radius:12px;border:1px solid var(--bd);background:rgba(255,255,255,.04);color:var(--text);font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.7rem;transition:all .25s;margin-bottom:1.4rem}
.btn-google:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.07)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

/* DIVIDER */
.div{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--bd)}
.div span{font-size:.78rem;color:var(--muted)}

/* FORM */
.field{margin-bottom:1.1rem}
label{display:block;font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:.45rem}
input{width:100%;padding:.82rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.92rem;outline:none;transition:border-color .25s}
input::placeholder{color:var(--muted)}
input:focus{border-color:rgba(0,206,255,.4);background:rgba(0,206,255,.02)}
.btn-primary{width:100%;padding:.88rem;border-radius:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#060612;font-family:'Outfit',sans-serif;font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:opacity .2s,transform .2s;margin-top:.3rem;box-shadow:0 4px 24px rgba(0,206,255,.28)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.55;cursor:default;transform:none}

/* MESSAGES */
.msg{padding:.8rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.msg.err{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.25);color:#FF7090;display:block}
.msg.ok{background:rgba(0,206,255,.08);border:1px solid rgba(0,206,255,.2);color:var(--acc);display:block}

/* FOOTER */
.card-foot{text-align:center;margin-top:1.2rem;font-size:.8rem;color:var(--muted)}
.card-foot a{color:var(--acc);text-decoration:none}
.card-foot a:hover{text-decoration:underline}

footer{position:relative;z-index:1;padding:1.5rem;text-align:center;font-size:.78rem;color:var(--muted)}
footer a{color:var(--muted);text-decoration:none;margin:0 .6rem}
footer a:hover{color:var(--text)}

@media(max-width:480px){.card-body{padding:1.5rem}}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav>
  <a href="/" class="logo">
    <svg class="logo-ic" viewBox="0 0 100 100">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
      <rect x="2" y="2" width="96" height="96" rx="26" fill="#0c1424" stroke="rgba(120,170,255,.18)" stroke-width="1"/>
      <path d="M50 18 C53 41,55 45,82 50 C55 55,53 59,50 82 C47 59,45 55,18 50 C45 45,47 41,50 18 Z" fill="url(#g)"/>
      <circle cx="73" cy="29" r="4.6" fill="#22d3ee"/>
    </svg>
    <span class="logo-t">Rez<span>pona</span></span>
  </a>
  <a href="/" class="back">&larr; Back to home</a>
</nav>

<main>
  <div class="card">
    <div class="card-head">
      <h1>Welcome back</h1>
      <p>Sign in to manage your reviews</p>
    </div>
    <div class="card-body">

      <div class="tabs">
        <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign in</button>
        <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create account</button>
      </div>

      <div id="msg" class="msg"></div>

      <!-- Google -->
      <button class="btn-google" onclick="signInGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="div"><span>or</span></div>

      <!-- Email form -->
      <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="field" id="nameField" style="display:none">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Your name" autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
      </form>

    </div>
    <div class="card-foot" id="cardFoot">
      Don't have an account? <a href="#" onclick="switchTab('signup');return false">Create one free</a>
    </div>
  </div>
</main>

<footer>
  <a href="/privacy.html">Privacy Policy</a>
  <a href="/terms.html">Terms of Service</a>
</footer>

<script>
  const SUPABASE_URL = 'https://upepsbyqqefdaygmjxie.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwZXBzYnlxcWVmZGF5Z21qeGllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDM1NjMsImV4cCI6MjA5NjMxOTU2M30.XZNA0TmVZQmPeoniut3fkOyj1A6-lmfHvhvx5hMBaTc';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let mode = 'signin';

  // Redirect if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/dashboard.html';
  });

  // Handle OAuth redirect
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = '/dashboard.html';
    }
  });

  function switchTab(tab) {
    mode = tab;
    document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
    document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('nameField').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('submitBtn').textContent = tab === 'signin' ? 'Sign in' : 'Create account';
    document.getElementById('cardFoot').innerHTML = tab === 'signin'
      ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\');return false">Create one free</a>'
      : 'Already have an account? <a href="#" onclick="switchTab(\'signin\');return false">Sign in</a>';
    document.getElementById('password').setAttribute('autocomplete', tab === 'signup' ? 'new-password' : 'current-password');
    clearMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }

  function showConfirmScreen(email) {
    document.querySelector('.card-body').innerHTML = `
      <div style="text-align:center;padding:1rem 0">
        <div style="font-size:2.8rem;margin-bottom:1rem">📧</div>
        <h2 style="font-size:1.2rem;font-weight:600;margin-bottom:.6rem;color:var(--text)">Check your email</h2>
        <p style="font-size:.9rem;color:var(--muted);font-weight:300;margin-bottom:.4rem">
          We sent a confirmation link to:
        </p>
        <p style="font-size:.95rem;font-weight:600;color:var(--acc);margin-bottom:1.4rem">${email}</p>
        <p style="font-size:.85rem;color:var(--muted);font-weight:300;line-height:1.6;margin-bottom:1.6rem">
          Click the link in the email to activate your account.<br>
          Check your spam folder if you don't see it.
        </p>
        <button onclick="location.reload()" style="padding:.7rem 1.8rem;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:.88rem;cursor:pointer;">
          Back to sign in
        </button>
      </div>
    `;
    document.getElementById('cardFoot').innerHTML = '';
  }

  async function signInGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    });
    if (error) showMsg(error.message, 'err');
  }

  async function handleSubmit(e) {
    e.preventDefault();
    clearMsg();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Please wait...';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const name     = document.getElementById('name').value.trim();

    try {
      if (mode === 'signup') {
        const { error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        if (error) throw error;
        // Show success screen instead of just a message
        showConfirmScreen(email);
        return;
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          if (error.message.toLowerCase().includes('email not confirmed')) {
            showMsg('Please check your email and click the confirmation link before signing in.', 'err');
          } else if (error.message.toLowerCase().includes('invalid login')) {
            showMsg('Wrong email or password. Please try again.', 'err');
          } else {
            throw error;
          }
          return;
        }
        window.location.href = '/dashboard.html';
      }
    } catch (err) {
      showMsg(err.message || 'Something went wrong. Try again.', 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = mode === 'signin' ? 'Sign in' : 'Create account';
    }
  }
</script>
</body>
</html>
